<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Business Card</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Theme Switch -->
  <div class="theme-switch">
    <label class="switch">
      <input type="checkbox" id="toggle-theme">
      <span class="slider"></span>
    </label>
  </div>

  <div class="business-card">
    <img
      class="profile-image"
      src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg"
      alt="Profile flower image"
    >

    <p class="full-name">Cristian Delgado Oliveira</p>
    <p class="designation">Software Developer</p>
    <p class="company">@vafuu</p>

    <hr>

    <p class="email">cristiandelgadooliveira@gmail.com</p>

    <hr>

    <div class="social-media">
      <h2>Connect with me</h2>
      <a href="https://x.com/vafuu1" target="_blank">Twitter</a>
      <a href="https://github.com/vafuu" target="_blank">GitHub</a>
      <a href="https://www.instagram.com/elcriiisss/" target="_blank">Instagram</a>
    </div>
  </div>

  <script>
    const toggle = document.getElementById("toggle-theme");

    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark");
      toggle.checked = true;
    }

    toggle.addEventListener("change", () => {
      document.body.classList.toggle("dark");
      localStorage.setItem(
        "theme",
        document.body.classList.contains("dark") ? "dark" : "light"
      );
    });
  </script>

</body>
</html>
